name: Attach EXE to Release

on:
  release:
    types: [created]

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v1
        with:
          files: MoireRemover_Setup.exe
